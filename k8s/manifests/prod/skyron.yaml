apiVersion: v1
kind: Namespace
metadata:
  name: skyron-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skyron-config
  namespace: skyron-prod
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka.skyron.svc.cluster.local:9092"
  KAFKA_TASKS_TOPIC: "skyron.tasks"
  KAFKA_RETRY_TOPIC: "skyron.tasks.retry"
  KAFKA_DLQ_TOPIC: "skyron.tasks.dlq"
  MAX_RETRIES: "5"
  RETRY_BASE_SECONDS: "2"
---
apiVersion: v1
kind: Secret
metadata:
  name: skyron-secrets
  namespace: skyron-prod
type: Opaque
stringData:
  DATABASE_URL: "postgresql://skyron:CHANGE_ME@rds-endpoint:5432/skyron"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyron-backend
  namespace: skyron-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skyron-backend
  template:
    metadata:
      labels:
        app: skyron-backend
    spec:
      containers:
      - name: backend
        image: skyron/backend:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: skyron-config
        - secretRef:
            name: skyron-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: skyron-backend
  namespace: skyron-prod
spec:
  selector:
    app: skyron-backend
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyron-worker
  namespace: skyron-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skyron-worker
  template:
    metadata:
      labels:
        app: skyron-worker
    spec:
      containers:
      - name: worker
        image: skyron/worker:0.1.0
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: skyron-config
        - secretRef:
            name: skyron-secrets
        resources:
          requests:
            cpu: "300m"
            memory: "256Mi"
          limits:
            cpu: "1500m"
            memory: "1Gi"
        livenessProbe:
          exec:
            command: ["python", "-c", "import os; os.kill(1, 0)"]
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skyron-worker-hpa
  namespace: skyron-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skyron-worker
  minReplicas: 2
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skyron-backend-hpa
  namespace: skyron-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skyron-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyron-frontend
  namespace: skyron-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skyron-frontend
  template:
    metadata:
      labels:
        app: skyron-frontend
    spec:
      containers:
      - name: frontend
        image: skyron/frontend:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: skyron-frontend
  namespace: skyron-prod
spec:
  selector:
    app: skyron-frontend
  ports:
  - port: 80
    targetPort: 8080
