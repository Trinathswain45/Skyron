apiVersion: v1
kind: Namespace
metadata:
  name: skyron-dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skyron-config
  namespace: skyron-dev
data:
  KAFKA_BOOTSTRAP_SERVERS: "host.minikube.internal:9092"
  KAFKA_TASKS_TOPIC: "skyron.tasks"
  KAFKA_RETRY_TOPIC: "skyron.tasks.retry"
  KAFKA_DLQ_TOPIC: "skyron.tasks.dlq"
  MAX_RETRIES: "3"
  RETRY_BASE_SECONDS: "2"
---
apiVersion: v1
kind: Secret
metadata:
  name: skyron-secrets
  namespace: skyron-dev
type: Opaque
stringData:
  DATABASE_URL: "postgresql://skyron:skyron@host.minikube.internal:5432/skyron"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyron-backend
  namespace: skyron-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skyron-backend
  template:
    metadata:
      labels:
        app: skyron-backend
    spec:
      containers:
      - name: backend
        image: skyron/backend:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: skyron-config
        - secretRef:
            name: skyron-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: skyron-backend
  namespace: skyron-dev
spec:
  selector:
    app: skyron-backend
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyron-worker
  namespace: skyron-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skyron-worker
  template:
    metadata:
      labels:
        app: skyron-worker
    spec:
      containers:
      - name: worker
        image: skyron/worker:0.1.0
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: skyron-config
        - secretRef:
            name: skyron-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "800m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["python", "-c", "import os; os.kill(1, 0)"]
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skyron-worker-hpa
  namespace: skyron-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skyron-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skyron-backend-hpa
  namespace: skyron-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skyron-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyron-frontend
  namespace: skyron-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skyron-frontend
  template:
    metadata:
      labels:
        app: skyron-frontend
    spec:
      containers:
      - name: frontend
        image: skyron/frontend:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: skyron-frontend
  namespace: skyron-dev
spec:
  selector:
    app: skyron-frontend
  ports:
  - port: 80
    targetPort: 8080
