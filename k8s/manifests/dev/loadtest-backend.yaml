apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyron-backend-loadgen
  namespace: skyron-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skyron-backend-loadgen
  template:
    metadata:
      labels:
        app: skyron-backend-loadgen
    spec:
      containers:
      - name: loadgen
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
        - >
          i=0;
          while true; do
            i=$((i+1));
            wget -qO- --header='Content-Type: application/json' --post-data='{"payload":"load-'"$i"'"}' http://skyron-backend:8000/tasks >/dev/null;
            sleep 0.05;
          done
